name: Build and Deploy

on:
    push:
        branches: ["master"] # Triggers whenever you push to master

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                  # This configures the new builder instance
                  install: true

            # Step 2: Configure and restore cache
            - name: Cache Docker layers
              uses: actions/cache@v4
              with:
                  path: /tmp/.buildx-cache
                  # Use a stable key for restoring, incorporating relevant file hashes
                  key: ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile') }}
                  restore-keys: |
                      ${{ runner.os }}-buildx-

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  # Replace 'your-username' and 'your-repo' with your actual info
                  tags: ghcr.io/${{ github.repository_owner }}/curse-bot:latest
                  # This helps speed up subsequent builds
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
