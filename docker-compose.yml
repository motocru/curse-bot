services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  curse-bot:
    build: .
    container_name: curse-bot
    depends_on:
      - mongodb
    env_file:
      - ./.env
    restart: unless-stopped
volumes:
  mongo_data:
